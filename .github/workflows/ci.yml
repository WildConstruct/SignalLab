name: ci

# Runs as a PR checkpoint + on manual dispatch. We intentionally do NOT run on
# every branch push: the WildConstruct org's GitHub-hosted Actions runners are
# currently unavailable (jobs never get a runner and fail in seconds), and the
# demo deploys manually to the gh-pages branch. Re-add `push` here once the org
# Actions/billing block is cleared.
on:
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:

jobs:
  engine-logic:
    name: Engine logic + contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 1. WGSL parity oracle (CPU reference port mirrors signal_core.wgsl)
      - name: validate.js (signal engine logic)
        run: node prototypes/webgpu-lab/validate.js

      # 2a. Live-courier value codec (CPU/GPU/expression parity oracle)
      - name: value codec round-trip (validate.js)
        run: node prototypes/webgpu-lab/codec-validate.js

      # 2. C++ contract: Recipe -> Compile() WGSL-parity + AE param mapping
      - name: core contract (compile + run)
        run: |
          g++ -std=c++17 -I include -I . examples/core_contract_test.cpp -o core_contract_test
          ./core_contract_test

      # 2b. C++ value codec parity with the JS reference
      - name: value codec parity (C++)
        run: |
          g++ -std=c++17 -I include examples/value_codec_test.cpp -o value_codec_test
          ./value_codec_test

      # 2c. AE bake contract: interpreted outputs -> deterministic keyframes
      - name: AE bake contract (C++)
        run: |
          g++ -std=c++17 -I include examples/ae_bake_contract_test.cpp -o ae_bake_contract_test
          ./ae_bake_contract_test

      # 2d. Live-courier 3x1 value strip packing
      - name: live courier strip contract (C++)
        run: |
          g++ -std=c++17 -I include examples/live_courier_strip_test.cpp -o live_courier_strip_test
          ./live_courier_strip_test

      # 3. WGSL embed codegen produces a valid header
      - name: wgsl embed codegen
        run: |
          cmake -DWGSL_IN=shaders/signal_core.wgsl \
                -DWGSL_OUT=signal_core_wgsl.h \
                -DWGSL_SYMBOL=kSignalCoreWgsl \
                -P tools/embed_wgsl.cmake
          test -s signal_core_wgsl.h
          grep -q "kSignalCoreWgsl" signal_core_wgsl.h

      # 4. Schemas + recipes are valid JSON
      - name: validate json (schemas + recipes)
        run: |
          for f in schemas/*.json schemas/examples/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || { echo "BAD $f"; exit 1; }
          done
          echo "all JSON valid"

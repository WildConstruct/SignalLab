name: deploy-pages

# Publishes ONLY the Signal Lab demo (not the whole repo) to GitHub Pages, so a
# private repo doesn't expose its source. WebGPU needs a secure context — Pages
# is HTTPS — and the CPU-reference fallback means it renders even where mobile
# WebGPU is unavailable.
on:
  push:
    branches: ["claude/signal-rack-prototype-plan-szukfq", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble demo site (tool + the two files it loads)
        run: |
          mkdir -p _site/tool _site/shaders _site/prototypes/webgpu-lab
          cp tool/index.html                                   _site/tool/index.html
          cp shaders/signal_core.wgsl                          _site/shaders/signal_core.wgsl
          cp prototypes/webgpu-lab/signal-core-reference.js    _site/prototypes/webgpu-lab/signal-core-reference.js
          # root URL -> the tool
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=./tool/">\n' > _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

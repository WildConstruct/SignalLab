<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signal Rack — Signal Generator</title>
<style>
  :root{
    --bg:#07090b; --panel:#0f1318; --edge:#1c242c; --ink:#cdd9e1; --dim:#6b7a87;
    --x:#36f09a; --y:#f0b23a;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
        font:13px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,sans-serif; }
  header{ display:flex; align-items:baseline; gap:12px; padding:14px 18px 8px; }
  header h1{ font-size:15px; margin:0; letter-spacing:.3px; }
  header .tag{ color:var(--dim); font-size:11px; }
  #engine{ margin-left:auto; font-size:11px; padding:2px 8px; border-radius:10px;
           border:1px solid var(--edge); color:var(--dim); cursor:pointer; user-select:none; }
  #engine.web{ color:#8fe; border-color:#2b6; }
  #engine.cpu{ color:#fb9; border-color:#a63; }
  .wrap{ display:grid; grid-template-columns: 320px 1fr; gap:14px; padding:0 18px 18px; }
  @media (max-width: 860px){ .wrap{ grid-template-columns:1fr; } }
  .panel{ background:var(--panel); border:1px solid var(--edge); border-radius:10px; padding:12px; }
  .panel h2{ font-size:12px; margin:0 0 10px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; }
  .chan{ border-left:3px solid var(--x); padding-left:10px; margin-bottom:14px; }
  .chan.y{ border-color:var(--y); }
  .chan .name{ font-weight:600; margin-bottom:6px; }
  .chan.x .name{ color:var(--x);} .chan.y .name{ color:var(--y); }
  .ctl{ display:grid; grid-template-columns: 64px 1fr 46px; align-items:center; gap:8px; margin:5px 0; }
  .ctl label{ color:var(--dim); font-size:11px; }
  .ctl output{ font-variant-numeric:tabular-nums; color:var(--ink); text-align:right; font-size:11px; }
  input[type=range]{ width:100%; accent-color:#3a7; }
  select{ background:#0b0e12; color:var(--ink); border:1px solid var(--edge); border-radius:5px; padding:3px 5px; width:100%; }
  .presets{ display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .presets button{ background:#0b0e12; color:var(--ink); border:1px solid var(--edge);
                   border-radius:6px; padding:4px 9px; font-size:11px; cursor:pointer; }
  .presets button:hover{ border-color:#3a6; color:#bfe; }
  .scopes{ display:grid; grid-template-rows:auto auto; gap:14px; }
  .scopewrap{ background:#05070a; border:1px solid var(--edge); border-radius:10px; padding:10px; position:relative; }
  .scopewrap .lbl{ position:absolute; top:8px; left:12px; font-size:10px; color:var(--dim);
                   letter-spacing:.5px; text-transform:uppercase; }
  .scopewrap .read{ position:absolute; top:8px; right:12px; font-size:11px; color:var(--dim);
                    font-variant-numeric:tabular-nums; }
  canvas{ display:block; width:100%; }
  .vec{ display:grid; grid-template-columns:1fr; }
  .vecwrap{ display:flex; justify-content:center; }
  #vector{ width:340px; height:340px; max-width:100%; }
</style>
</head>
<body>
<header>
  <h1>Signal Rack</h1>
  <span class="tag">signal generator · waveform + vectorscope</span>
  <span id="engine" class="cpu" title="Click to try the WebGPU engine">engine: …</span>
</header>

<div class="wrap">
  <!-- controls -->
  <div class="panel" id="controls">
    <h2>Generator</h2>

    <div class="chan x" data-ch="x">
      <div class="name">Channel X</div>
      <div class="ctl"><label>Source</label>
        <select data-p="src">
          <option value="1">Sine</option><option value="2">Pulse</option>
          <option value="3">Ramp</option><option value="4">Noise</option>
          <option value="5">Random Walk</option>
        </select><output></output></div>
      <div class="ctl"><label>Rate</label><input type="range" data-p="rate" min="0.1" max="8" step="0.1" value="2"><output></output></div>
      <div class="ctl"><label>Phase</label><input type="range" data-p="phase" min="0" max="1" step="0.005" value="0"><output></output></div>
      <div class="ctl"><label>Amount</label><input type="range" data-p="amount" min="0" max="1.5" step="0.02" value="1"><output></output></div>
      <div class="ctl"><label>Offset</label><input type="range" data-p="offset" min="-0.5" max="0.5" step="0.02" value="0"><output></output></div>
      <div class="ctl"><label>Smooth</label><input type="range" data-p="smooth" min="0" max="1" step="0.02" value="0"><output></output></div>
      <div class="ctl"><label>Seed</label><input type="range" data-p="seed" min="1" max="9999" step="1" value="1941"><output></output></div>
    </div>

    <div class="chan y" data-ch="y">
      <div class="name">Channel Y</div>
      <div class="ctl"><label>Source</label>
        <select data-p="src">
          <option value="1">Sine</option><option value="2">Pulse</option>
          <option value="3">Ramp</option><option value="4">Noise</option>
          <option value="5">Random Walk</option>
        </select><output></output></div>
      <div class="ctl"><label>Rate</label><input type="range" data-p="rate" min="0.1" max="8" step="0.1" value="3"><output></output></div>
      <div class="ctl"><label>Phase</label><input type="range" data-p="phase" min="0" max="1" step="0.005" value="0"><output></output></div>
      <div class="ctl"><label>Amount</label><input type="range" data-p="amount" min="0" max="1.5" step="0.02" value="1"><output></output></div>
      <div class="ctl"><label>Offset</label><input type="range" data-p="offset" min="-0.5" max="0.5" step="0.02" value="0"><output></output></div>
      <div class="ctl"><label>Smooth</label><input type="range" data-p="smooth" min="0" max="1" step="0.02" value="0"><output></output></div>
      <div class="ctl"><label>Seed</label><input type="range" data-p="seed" min="1" max="9999" step="1" value="77"><output></output></div>
    </div>

    <h2 style="margin-top:6px">Presets</h2>
    <div class="presets" id="presets">
      <button data-preset="circle">Circle 1:1</button>
      <button data-preset="lissa23">Lissajous 2:3</button>
      <button data-preset="lissa34">Lissajous 3:4</button>
      <button data-preset="pulsegate">Pulse × Sine</button>
      <button data-preset="noise">Noise cloud</button>
    </div>

    <h2 style="margin-top:12px">Display</h2>
    <div class="ctl"><label>Window</label><input type="range" id="span" min="0.5" max="8" step="0.5" value="3"><output id="spanv"></output></div>
    <div class="ctl"><label>Persist</label><input type="range" id="persist" min="0" max="0.95" step="0.05" value="0.8"><output id="persistv"></output></div>
    <div class="ctl"><label>Freeze</label><input type="checkbox" id="freeze"><output></output></div>

    <div class="presets" style="margin-top:10px">
      <button id="exportBtn">Export recipe JSON</button>
    </div>
    <textarea id="recipeOut" readonly placeholder="An experiment you like → Export → paste into schemas/examples/"
      style="display:none; width:100%; height:150px; margin-top:8px; background:#0b0e12; color:#bfe;
             border:1px solid var(--edge); border-radius:6px; font:11px/1.4 ui-monospace,Menlo,monospace; padding:8px;"></textarea>
  </div>

  <!-- scopes -->
  <div class="scopes">
    <div class="scopewrap">
      <span class="lbl">Waveform — X<span style="color:var(--x)"> ▬</span>  Y<span style="color:var(--y)"> ▬</span></span>
      <span class="read" id="waveRead">—</span>
      <canvas id="wave" height="220"></canvas>
    </div>
    <div class="scopewrap vec">
      <span class="lbl">Vectorscope — X vs Y</span>
      <span class="read" id="vecRead">—</span>
      <div class="vecwrap"><canvas id="vector" width="680" height="680"></canvas></div>
    </div>
  </div>
</div>

<!-- the validated CPU reference engine (bit-identical to shaders/signal_core.wgsl) -->
<script src="../prototypes/webgpu-lab/signal-core-reference.js"></script>
<script>
const { Rack, SOURCE, MODE } = SignalCore;
const N = 1024;                 // samples per window
let SPAN = 3.0, PERSIST = 0.8, FREEZE = false, frozenT = 0;

// ---- channel state ---------------------------------------------------------
const state = {
  x: { src:1, rate:2, phase:0, amount:1, offset:0, smooth:0, seed:1941 },
  y: { src:1, rate:3, phase:0, amount:1, offset:0, smooth:0, seed:77 },
};

// ---- engine abstraction: sample a channel's normalized 0..1 over a time grid
// CPU path uses the reference Rack (Output A = Normalized 0..1 -> the base n).
// WebGPU path (optional) dispatches shaders/signal_core.wgsl for the same grid.
const Engine = {
  mode: "cpu", device: null, pipeline: null, bufs: null,
  cpuRack(cfg){
    return new Rack({ srcType:cfg.src, rate:cfg.rate, phase:cfg.phase, amount:cfg.amount,
      offset:cfg.offset, smooth:cfg.smooth, seed:cfg.seed,
      outputs:{ A:{ mode:MODE.normalized, min:0, max:1 } } });
  },
  sampleCPU(cfg, startTime, dt, out){
    const r = this.cpuRack(cfg);
    for (let i=0;i<N;i++) out[i] = r.output("A", startTime + i*dt);
    return out;
  },
  async tryWebGPU(){
    if (!navigator.gpu) return false;
    try{
      const adapter = await navigator.gpu.requestAdapter(); if(!adapter) return false;
      this.device = await adapter.requestDevice();
      const code = await (await fetch("../shaders/signal_core.wgsl")).text();
      const mod = this.device.createShaderModule({ code });
      this.pipeline = this.device.createComputePipeline({ layout:"auto", compute:{ module:mod, entryPoint:"main" }});
      const d = this.device;
      this.bufs = {
        param: d.createBuffer({ size:24*4, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST }),
        out:   d.createBuffer({ size:N*4*4, usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_SRC }),
        luma:  d.createBuffer({ size:N*4,   usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST }),
        read:  d.createBuffer({ size:N*4*4, usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ }),
      };
      this.bind = d.createBindGroup({ layout:this.pipeline.getBindGroupLayout(0), entries:[
        { binding:0, resource:{ buffer:this.bufs.param }},
        { binding:1, resource:{ buffer:this.bufs.out }},
        { binding:2, resource:{ buffer:this.bufs.luma }},
      ]});
      this.mode = "webgpu";
      return true;
    } catch(e){ console.warn("WebGPU init failed, staying on CPU:", e); return false; }
  },
  async sampleGPU(cfg, startTime, dt, out){
    const p = new Float32Array(24);
    p[0]=cfg.src; p[1]=cfg.rate; p[2]=cfg.amount; p[3]=cfg.phase; p[4]=cfg.seed; p[5]=cfg.offset||0; p[6]=cfg.smooth;
    p[8]=startTime; p[9]=dt; p[10]=1/60; p[11]=N;
    p[12]=MODE.normalized; p[13]=0; p[14]=1;        // Output A = normalized
    p[16]=MODE.normalized; p[20]=MODE.normalized;
    const d=this.device, b=this.bufs;
    d.queue.writeBuffer(b.param,0,p);
    const enc=d.createCommandEncoder(); const pass=enc.beginComputePass();
    pass.setPipeline(this.pipeline); pass.setBindGroup(0,this.bind);
    pass.dispatchWorkgroups(Math.ceil(N/64)); pass.end();
    enc.copyBufferToBuffer(b.out,0,b.read,0,N*4*4);
    d.queue.submit([enc.finish()]);
    await b.read.mapAsync(GPUMapMode.READ);
    const arr=new Float32Array(b.read.getMappedRange());
    for(let i=0;i<N;i++) out[i]=arr[i*4];           // normalized base
    b.read.unmap();
    return out;
  },
  async sample(cfg, startTime, dt, out){
    return this.mode==="webgpu" ? this.sampleGPU(cfg,startTime,dt,out) : this.sampleCPU(cfg,startTime,dt,out);
  }
};

// ---- UI wiring -------------------------------------------------------------
function fmt(p,v){ if(p==="src") return ["","Sine","Pulse","Ramp","Noise","Walk"][v]||v;
  if(p==="seed"||p==="rate") return (+v).toFixed(p==="rate"?1:0); return (+v).toFixed(2); }
function bindChannel(ch){
  document.querySelectorAll(`.chan[data-ch="${ch}"] [data-p]`).forEach(el=>{
    const p=el.dataset.p; const o=el.parentElement.querySelector("output");
    const set=()=>{ state[ch][p]=+el.value; if(o) o.textContent=fmt(p,el.value); };
    el.addEventListener("input",set); set();
  });
}
bindChannel("x"); bindChannel("y");

const presets={
  circle:{ x:{src:1,rate:1,phase:0}, y:{src:1,rate:1,phase:0.25} },
  lissa23:{ x:{src:1,rate:2,phase:0}, y:{src:1,rate:3,phase:0} },
  lissa34:{ x:{src:1,rate:3,phase:0}, y:{src:1,rate:4,phase:0.12} },
  pulsegate:{ x:{src:2,rate:2,phase:0}, y:{src:1,rate:2,phase:0.25} },
  noise:{ x:{src:5,rate:1.2,phase:0,smooth:0.3}, y:{src:5,rate:1.4,phase:0,smooth:0.3,seed:412} },
};
document.getElementById("presets").addEventListener("click",e=>{
  const k=e.target.dataset.preset; if(!k) return;
  for(const ch of ["x","y"]) Object.assign(state[ch], presets[k][ch]||{});
  // reflect into inputs
  for(const ch of ["x","y"]) document.querySelectorAll(`.chan[data-ch="${ch}"] [data-p]`).forEach(el=>{
    const p=el.dataset.p; if(state[ch][p]!=null){ el.value=state[ch][p]; el.dispatchEvent(new Event("input")); }
  });
});

const spanEl=document.getElementById("span"), persistEl=document.getElementById("persist"), freezeEl=document.getElementById("freeze");
const spanV=document.getElementById("spanv"), persistV=document.getElementById("persistv");
spanEl.oninput=()=>{ SPAN=+spanEl.value; spanV.textContent=SPAN.toFixed(1)+"s"; }; spanEl.oninput();
persistEl.oninput=()=>{ PERSIST=+persistEl.value; persistV.textContent=PERSIST.toFixed(2); }; persistEl.oninput();
freezeEl.onchange=()=>{ FREEZE=freezeEl.checked; if(FREEZE) frozenT=now(); };

// export the current experiment as a Signal Rack recipe (matches schemas/)
const SRCNAME=["","sine","pulse","ramp","noise","randomWalk"];
function buildRecipe(){
  function ch(cfg){ return { type:SRCNAME[cfg.src], rate:cfg.rate, amount:cfg.amount, phase:cfg.phase, offset:cfg.offset }; }
  return {
    type:"wildconstruct.signalRecipe", name:"Experiment", id:"sg_experiment", version:"0.2",
    rackType:"generator",
    source: ch(state.x),
    process:{ smooth: state.x.smooth },
    outputs:{
      A:{ name:"X (Channel X)", profile:"normalized_0_1", range:[0,1], units:"none" },
      B:{ name:"Y (Channel Y)", profile:"normalized_0_1", range:[0,1], units:"none" },
      C:{ name:"Gate", profile:"gate", range:[0,1], units:"none" }
    },
    timebase:{ mode:"compTime", seed: state.x.seed },
    _channelY: ch(state.y),  // the second scope axis; a real rig = a second rack
    compatibilityTags:["engine:wgsl","tool:signal-generator"]
  };
}
const exportBtn=document.getElementById("exportBtn"), recipeOut=document.getElementById("recipeOut");
exportBtn.onclick=()=>{ const txt=JSON.stringify(buildRecipe(),null,2);
  recipeOut.style.display="block"; recipeOut.value=txt; recipeOut.select();
  try{ navigator.clipboard.writeText(txt); exportBtn.textContent="Copied ✓"; setTimeout(()=>exportBtn.textContent="Export recipe JSON",1200);}catch(e){} };

const engineBadge=document.getElementById("engine");
function setBadge(){ engineBadge.textContent = "engine: "+(Engine.mode==="webgpu"?"WebGPU (signal_core.wgsl)":"CPU reference");
  engineBadge.className = Engine.mode==="webgpu" ? "web" : "cpu"; }
engineBadge.onclick=async()=>{ if(Engine.mode==="webgpu") return; engineBadge.textContent="engine: starting WebGPU…";
  const ok=await Engine.tryWebGPU(); setBadge(); if(!ok) engineBadge.title="WebGPU unavailable — using CPU reference"; };

// ---- drawing ---------------------------------------------------------------
const wave=document.getElementById("wave"), wctx=wave.getContext("2d");
const vector=document.getElementById("vector"), vctx=vector.getContext("2d");
const bufX=new Float32Array(N), bufY=new Float32Array(N);
function now(){ return performance.now()/1000; }

function sizeCanvas(c){ const r=c.getBoundingClientRect(); const dpr=Math.min(devicePixelRatio||1,2);
  if(c.width!==Math.round(r.width*dpr)){ c.width=Math.round(r.width*dpr); } if(c.height!==Math.round((c===wave?220:r.height)*dpr)){ c.height=Math.round((c===wave?220:r.height)*dpr);} return dpr; }

function drawWaveGrid(W,H){
  wctx.clearRect(0,0,W,H);
  wctx.strokeStyle="#101820"; wctx.lineWidth=1;
  for(let i=0;i<=8;i++){ const x=i/8*W; wctx.beginPath(); wctx.moveTo(x,0); wctx.lineTo(x,H); wctx.stroke(); }
  for(let j=0;j<=4;j++){ const y=j/4*H; wctx.beginPath(); wctx.moveTo(0,y); wctx.lineTo(W,y); wctx.stroke(); }
  wctx.strokeStyle="#1d2a34"; wctx.beginPath(); wctx.moveTo(0,H/2); wctx.lineTo(W,H/2); wctx.stroke();
}
function trace(buf,W,H,color){
  wctx.strokeStyle=color; wctx.lineWidth=2; wctx.shadowColor=color; wctx.shadowBlur=6; wctx.beginPath();
  for(let i=0;i<N;i++){ const x=i/(N-1)*W; const v=buf[i]*2-1; const y=(0.5 - v*0.46)*H;
    i?wctx.lineTo(x,y):wctx.moveTo(x,y); }
  wctx.stroke(); wctx.shadowBlur=0;
}
function drawVectorGraticule(S){
  vctx.fillStyle="rgba(5,7,10,1)"; vctx.fillRect(0,0,S,S);
  vctx.strokeStyle="#101a20"; vctx.lineWidth=1;
  vctx.strokeRect(2,2,S-4,S-4);
  vctx.beginPath(); vctx.moveTo(S/2,0); vctx.lineTo(S/2,S); vctx.moveTo(0,S/2); vctx.lineTo(S,S/2); vctx.stroke();
  vctx.strokeStyle="#13202899"; for(let r=1;r<=3;r++){ vctx.beginPath(); vctx.arc(S/2,S/2,(r/3)*(S/2-6),0,Math.PI*2); vctx.stroke(); }
}

let lastVecSize=0;
function render(){
  const t = FREEZE ? frozenT : now();
  const dt = SPAN/N, start = t - SPAN;

  Promise.all([ Engine.sample(state.x,start,dt,bufX), Engine.sample(state.y,start,dt,bufY) ]).then(()=>{
    // waveform
    const dpr=sizeCanvas(wave); const W=wave.width, H=wave.height;
    drawWaveGrid(W,H); trace(bufX,W,H,"#36f09a"); trace(bufY,W,H,"#f0b23a");
    const xc=bufX[N-1]*2-1, yc=bufY[N-1]*2-1;
    document.getElementById("waveRead").textContent = `X ${xc>=0?"+":""}${xc.toFixed(3)}   Y ${yc>=0?"+":""}${yc.toFixed(3)}`;

    // vectorscope (square, persistence)
    const S=vector.width; if(S!==lastVecSize){ drawVectorGraticule(S); lastVecSize=S; }
    vctx.fillStyle=`rgba(5,7,10,${1-PERSIST})`; vctx.fillRect(0,0,S,S);   // fade
    if(PERSIST>0 && Math.random()<0.04){ drawVectorGraticule(S); }         // refresh graticule occasionally
    vctx.strokeStyle="#36f09a"; vctx.lineWidth=1.5; vctx.shadowColor="#36f09a"; vctx.shadowBlur=8; vctx.beginPath();
    const R=S/2-6, cx=S/2, cy=S/2;
    for(let i=0;i<N;i++){ const px=cx + (bufX[i]*2-1)*R, py=cy - (bufY[i]*2-1)*R; i?vctx.lineTo(px,py):vctx.moveTo(px,py); }
    vctx.stroke(); vctx.shadowBlur=0;
    document.getElementById("vecRead").textContent = `${Engine.mode==="webgpu"?"GPU":"CPU"} · ${N} pts`;

    requestAnimationFrame(render);
  });
}

// boot: CPU first (guaranteed), then offer WebGPU
setBadge();
// auto-attempt WebGPU once; fall back silently to CPU on failure
Engine.tryWebGPU().then(()=>{ setBadge(); requestAnimationFrame(render); });
</script>
</body>
</html>
